<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="pinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff5e62" />
      <stop offset="100%" stop-color="#ff9966" />
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  
  <!-- Map Grid Lines (Subtle) -->
  <path d="M 64,128 L 448,128 M 64,256 L 448,256 M 64,384 L 448,384 M 128,64 L 128,448 M 256,64 L 256,448 M 384,64 L 384,448" 
        stroke="#334155" stroke-width="6" stroke-linecap="round" opacity="0.3" />
        
  <!-- Route Path (Subtle Neon Glow) -->
  <path d="M 128,384 Q 180,220 256,256 T 384,128" 
        fill="none" stroke="#38bdf8" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" opacity="0.8" 
        stroke-dasharray="2 15" />

  <!-- Main Pin and Leaf Composition -->
  <g filter="url(#shadow)">
    <!-- Map Pin -->
    <path d="M 256,80 C 170,80 100,150 100,236 C 100,330 220,440 256,470 C 292,440 412,330 412,236 C 412,150 342,80 256,80 Z" 
          fill="url(#pinGrad)" />
          
    <!-- Inner Pin Cutout (Leaf Shape) -->
    <path d="M 256,130 C 285,130 310,155 310,190 C 310,235 256,290 256,290 C 256,290 202,235 202,190 C 202,155 227,130 256,130 Z" 
          fill="#ffffff" />
          
    <!-- Eco Leaf Overlaying the base -->
    <path d="M 256,190 C 256,190 290,160 300,190 C 310,220 270,250 256,260 C 242,250 202,220 212,190 C 222,160 256,190 256,190 Z" 
          fill="url(#leafGrad)" />
  </g>
</svg>
